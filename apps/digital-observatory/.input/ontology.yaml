version: "1.0.0"
label: "HDRI (Handwerk Digital Readiness Index) Handwerk Signal Ontology v1"
notes: >-
  Versioned catalog of all semantic signal paths used by the Digital Observatory.
  Separates WHAT exists (ontology) from HOW it is scored (codebook.yaml).
  Collectors must emit observations keyed by signal_path exactly as listed here.

signals:

  # ── Legal ──────────────────────────────────────────────────────────────────

  legal.impressum.present:
    label: "Impressum present"
    value_type: bool
    stability: high
    introduced_in: "1.0.0"
    deprecated_in: null
    extractor: rule_v3
    notes: "German §5 TMG mandatory disclosure. Scored zero-penalty when absent."

  legal.datenschutz.present:
    label: "Datenschutzerklärung present"
    value_type: bool
    stability: high
    introduced_in: "1.0.0"
    deprecated_in: null
    extractor: rule_v3
    notes: "GDPR Art. 13/14 privacy notice."

  legal.agb.present:
    label: "AGB present"
    value_type: bool
    stability: high
    introduced_in: "1.0.0"
    deprecated_in: null
    extractor: rule_v3

  legal.bfsg.present:
    label: "BFSG accessibility statement present"
    value_type: bool
    stability: medium
    introduced_in: "1.0.0"
    deprecated_in: null
    extractor: rule_v3
    notes: "Barrierefreiheitsstärkungsgesetz — applies to e-commerce from 2025-06-28."

  legal.widerruf.present:
    label: "Widerrufsrecht page present"
    value_type: bool
    stability: high
    introduced_in: "1.0.0"
    deprecated_in: null
    extractor: rule_v3
    notes: "Applicable only to e-commerce/checkout-enabled sites."

  legal.versand.present:
    label: "Versand & Lieferung page present"
    value_type: bool
    stability: medium
    introduced_in: "1.0.0"
    deprecated_in: null
    extractor: rule_v3
    notes: "Applicable only to e-commerce/checkout-enabled sites."

  # ── Privacy / Consent ──────────────────────────────────────────────────────

  privacy.consent.quality:
    label: "Cookie consent quality"
    value_type: str
    stability: high
    introduced_in: "1.0.0"
    deprecated_in: null
    extractor: dom_css_v2
    notes: >-
      Enum signal encoding the quality level of cookie consent implementation.
      Values: none | informational_only | accept_only | reject_equal_prominence | granular_with_revoke.
      Supersedes the binary privacy.consent.banner.present signal.
    supersedes:
      - privacy.consent.banner.present

  privacy.consent.banner.present:
    label: "Cookie banner present (legacy)"
    value_type: bool
    stability: low
    introduced_in: "1.0.0"
    deprecated_in: "1.0.0"
    extractor: dom_css_v2
    notes: "Deprecated — use privacy.consent.quality instead."

  # ── Contact ────────────────────────────────────────────────────────────────

  contact.form.present:
    label: "Contact form present"
    value_type: bool
    stability: high
    introduced_in: "1.0.0"
    deprecated_in: null
    extractor: dom_css_v2

  # ── Content ────────────────────────────────────────────────────────────────

  content.opening_hours.present:
    label: "Opening hours present"
    value_type: bool
    stability: high
    introduced_in: "1.0.0"
    deprecated_in: null
    extractor: dom_text_v1

  content.map.present:
    label: "Map / location embed present"
    value_type: bool
    stability: medium
    introduced_in: "1.0.0"
    deprecated_in: null
    extractor: dom_css_v2

  content.team_page.present:
    label: "Team / about-us page present"
    value_type: bool
    stability: medium
    introduced_in: "1.0.0"
    deprecated_in: null
    extractor: dom_text_v1

  content.portfolio.present:
    label: "Portfolio / Referenzen page present"
    value_type: bool
    stability: medium
    introduced_in: "1.0.0"
    deprecated_in: null
    extractor: dom_text_v1

  content.testimonials.present:
    label: "Customer testimonials present"
    value_type: bool
    stability: medium
    introduced_in: "1.0.0"
    deprecated_in: null
    extractor: dom_text_v1

  # ── Structured data ────────────────────────────────────────────────────────

  structured_data.schema_org.local_business.present:
    label: "LocalBusiness schema.org present"
    value_type: bool
    stability: high
    introduced_in: "1.0.0"
    deprecated_in: null
    extractor: json_ld_v1

  structured_data.schema_org.faq.present:
    label: "FAQPage schema.org present"
    value_type: bool
    stability: medium
    introduced_in: "1.0.0"
    deprecated_in: null
    extractor: json_ld_v1

  structured_data.schema_org.review.present:
    label: "Review schema.org present"
    value_type: bool
    stability: medium
    introduced_in: "1.0.0"
    deprecated_in: null
    extractor: json_ld_v1

  structured_data.schema_org.service.present:
    label: "Service schema.org present"
    value_type: bool
    stability: medium
    introduced_in: "1.0.0"
    deprecated_in: null
    extractor: json_ld_v1

  structured_data.schema_org.breadcrumb.present:
    label: "BreadcrumbList schema.org present"
    value_type: bool
    stability: low
    introduced_in: "1.0.0"
    deprecated_in: null
    extractor: json_ld_v1

  structured_data.schema_org.product.present:
    label: "Product schema.org present"
    value_type: bool
    stability: medium
    introduced_in: "1.0.0"
    deprecated_in: null
    extractor: json_ld_v1
    notes: "Applicable only to e-commerce sites."

  # ── Trust ──────────────────────────────────────────────────────────────────

  trust.certifications.present:
    label: "Trade certifications present"
    value_type: bool
    stability: high
    introduced_in: "1.0.0"
    deprecated_in: null
    extractor: dom_text_v1

  trust.certification.meister.present:
    label: "Meisterbrief credential present"
    value_type: bool
    stability: high
    introduced_in: "1.0.0"
    deprecated_in: null
    extractor: dom_text_v1

  trust.awards.present:
    label: "Awards / prizes present"
    value_type: bool
    stability: low
    introduced_in: "1.0.0"
    deprecated_in: null
    extractor: dom_text_v1

  trust.memberships.present:
