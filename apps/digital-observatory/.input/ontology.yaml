    deprecated_in: null
    extractor: dom_text_v1

  # ── Registry ───────────────────────────────────────────────────────────────

  registry.handelsregister.present:
    label: "Handelsregister number present"
    value_type: bool
    stability: high
    introduced_in: "1.0.0"
    deprecated_in: null
