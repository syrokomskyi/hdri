  # ── AXE Accessibility Audit ────────────────────────────────────────────────

  audit.axe.violations.critical.count:
    label: "AXE critical violations count"
    value_type: num
    stability: medium
    introduced_in: "1.0.0"
    deprecated_in: null
    extractor: axe_core_live
    notes: "Lower is better. Zero critical violations is the ideal target."

  audit.axe.violations.serious.count:
    label: "AXE serious violations count"
    value_type: num
    stability: medium
    introduced_in: "1.0.0"
    deprecated_in: null
    extractor: axe_core_live
    notes: "Lower is better. Serious issues have major impact on accessibility."

  audit.axe.violations.moderate.count:
    label: "AXE moderate violations count"
    value_type: num
    stability: medium
    introduced_in: "1.0.0"
    deprecated_in: null
    extractor: axe_core_live
    notes: "Lower is better. Moderate issues should be addressed in regular frontend work."

  audit.axe.violations.minor.count:
    label: "AXE minor violations count"
    value_type: num
    stability: medium
    introduced_in: "1.0.0"
    deprecated_in: null
    extractor: axe_core_live
    notes: "Lower is better. Minor issues have limited user impact but should be cleaned up iteratively."
